# PRODUCTION — app only, behind the website project's shared Caddy.
# Caddy (in ../website) terminates TLS and reverse-proxies wiki.ishamehta.ca to
# this container over the external `caddy_net` network. No ports are published.
#   docker network create caddy_net   # once, if it doesn't exist
#   docker compose up -d --build
services:
  app:
    build: .
    container_name: wiki-app
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=2000
    networks:
      - caddy_net

networks:
  caddy_net:
    external: true
