<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neutralizer</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-mark">N</div>
      <div class="brand-text">
        <div class="brand-name">Neutralizer</div>
        <div class="brand-sub">Strip AI puffery into plain, encyclopaedic prose</div>
      </div>
    </div>
  </header>

  <div class="toolbar">
    <div class="toolbar-hint">
      <span class="lede"><span class="dot"></span>Paste an AI-written draft, then clean it</span>
    </div>
    <div class="toolbar-actions">
      <button class="btn-ghost" id="resetBtn">Clear</button>
      <button class="btn-primary" id="cleanBtn">Clean up<span class="arrow">→</span></button>
    </div>
  </div>

  <main>
    <!-- INPUT -->
    <section class="pane">
      <div class="pane-head">
        <span class="pane-title">Source draft</span>
        <div class="tabs" id="tabs" hidden>
          <button class="tab" id="editTab">Edit</button>
          <button class="tab active" id="flagTab">Flagged<span class="count" id="issueCount">0</span></button>
        </div>
      </div>
      <div class="npv-body">
        <textarea id="input" class="npv-ta" placeholder="Paste your AI-generated Wikipedia text here…"></textarea>
        <div class="prose" id="annotated" hidden></div>
      </div>
    </section>

    <!-- OUTPUT -->
    <section class="pane">
      <div class="pane-head">
        <span class="pane-title accent">Neutral version</span>
        <span class="pane-status" id="status"></span>
      </div>
      <div class="npv-body">
        <div class="prose" id="clean" hidden></div>
        <div class="empty" id="outputEmpty">
          <div class="empty-glyph">¶</div>
          <div class="empty-text">The rewritten, neutral text will appear here after you clean a draft.</div>
        </div>
      </div>
    </section>

    <!-- ISSUES -->
    <aside class="pane">
      <div class="pane-head">
        <span class="pane-title">What changed</span>
      </div>
      <div class="npv-body">
        <div id="groups" hidden></div>
        <div class="legend" id="legend">
          <div class="legend-intro">Neutralizer flags the tells of machine-generated, non-encyclopaedic prose:</div>
        </div>
      </div>
    </aside>
  </main>

<script src="app.js"></script>
</body>
</html>
