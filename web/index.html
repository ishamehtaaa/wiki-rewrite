<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neutralizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-mark">N</div>
      <div class="brand-name">Neutralizer</div>
    </div>
    <div class="header-actions">
      <button class="btn-link" id="sampleBtn">Load example</button>
      <button class="btn-pill" id="resetBtn">Start over</button>
    </div>
  </header>

  <div class="sheet-wrap">
    <div class="sheet">

      <!-- STAGE 1: PASTE -->
      <div class="stage" id="stageEdit">
        <div class="npv-body">
          <div class="ta-wrap">
            <textarea id="input" class="npv-ta" placeholder="Paste an AI-generated Wikipedia draft here…"></textarea>
          </div>
        </div>
        <div class="edit-bar">
          <div class="legend" id="legend"><span class="legend-title">Scans for</span></div>
          <button class="btn-analyze" id="analyzeBtn">Analyze →</button>
        </div>
      </div>

      <!-- STAGE 2: REVIEW -->
      <div class="stage" id="stageReview" hidden>
        <div class="npv-body">
          <div class="review-col">
            <div class="verdict-card">
              <div class="verdict-badge" id="verdictBadge"></div>
              <div class="verdict-main">
                <div class="verdict-label" id="verdictLabel"></div>
                <div class="verdict-desc" id="verdictDesc"></div>
              </div>
              <div class="verdict-actions">
                <button class="btn-ghost-sm" id="editBtn">Edit text</button>
                <button class="btn-accent" id="rewriteBtn">Rewrite as neutral →</button>
              </div>
            </div>
            <div class="chips" id="chips" hidden></div>
            <div class="verdict-foot" id="verdictFoot" hidden></div>
            <div class="annotated" id="annotated"></div>
          </div>
        </div>
      </div>

      <!-- STAGE 3: NEUTRAL -->
      <div class="stage" id="stageClean" hidden>
        <div class="strip">
          <span class="strip-dot"></span>
          <span class="strip-label" id="stripLabel"></span>
          <span class="strip-status" id="stripStatus"></span>
          <span class="strip-spacer"></span>
          <button class="btn-pill btn-sm" id="backBtn">← Back to review</button>
        </div>
        <div class="split">
          <section class="col">
            <div class="col-head"><span class="col-title">Source · flagged</span></div>
            <div class="npv-body"><div class="prose" id="sourceProse"></div></div>
          </section>
          <div class="split-rule"></div>
          <section class="col col-neutral">
            <div class="col-head">
              <span class="col-title accent">Neutral version</span>
              <button class="btn-copy" id="copyBtn" disabled>Copy</button>
            </div>
            <div class="npv-body"><div class="prose" id="cleanProse"></div></div>
          </section>
        </div>
      </div>

    </div>
  </div>

<script type="module" src="app.js"></script>
</body>
</html>
